<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Icon Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 64px 24px 48px;
    }
    header h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 12px;
    }
    header p {
      font-size: 16px;
      color: #888;
      line-height: 1.6;
    }

    /* ── Main layout ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 80px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    @media (max-width: 640px) {
      main { flex-direction: column-reverse; }
      header h1 { font-size: 28px; }
    }

    /* ── Left panel ── */
    .left-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .preview-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 16px;
    }

    /* ── Sample icon grid ── */
    .sample-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .sample-card {
      background: #f7f7f8;
      border-radius: 12px;
      padding: 14px 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }
    .sample-card:hover {
      border-color: #0066ff;
      background: rgba(0,102,255,0.04);
    }
    .sample-card.selected {
      border-color: #0066ff;
      background: rgba(0,102,255,0.06);
    }
    .sample-card svg { width: 32px; height: 32px; display: block; }
    .sample-card .icon-name {
      font-size: 9px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* ── Attach button ── */
    .attach-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn-attach-file {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 16px;
      border: 1.5px solid #e4e4e6;
      border-radius: 10px;
      background: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-attach-file:hover { border-color: #1a1a1a; color: #1a1a1a; }
    .btn-attach-file svg { flex-shrink: 0; }

    .url-input {
      flex: 1;
      padding: 9px 14px;
      border: 1.5px solid #e4e4e6;
      border-radius: 10px;
      font-family: inherit;
      font-size: 12px;
      color: #1a1a1a;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .url-input::placeholder { color: #bbb; }
    .url-input:focus { border-color: #0066ff; }

    /* ── Attached preview chips ── */
    .attached-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: #f7f7f8;
      border: 1.5px solid #e4e4e6;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      max-width: 200px;
    }
    .chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 12px;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
    }
    .chip-remove:hover { color: #e03737; }

    /* ── Output card ── */
    .output-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: none;
    }
    .output-card.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .output-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .out-card {
      background: #f7f7f8;
      border-radius: 12px;
      padding: 16px 8px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      animation: fadeUp 0.35s ease both;
    }
    .out-card:hover { border-color: #0066ff; background: rgba(0,102,255,0.04); }
    .out-card svg, .out-card img { width: 40px; height: 40px; display: block; }
    .out-card .out-name {
      font-size: 9px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }
    .out-card .btn-dl {
      display: none;
      padding: 3px 10px;
      border: 1.5px solid #e4e4e6;
      border-radius: 6px;
      background: #fff;
      font-family: inherit;
      font-size: 9px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
    }
    .out-card:hover .btn-dl { display: block; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f2 25%, #e6e6e9 50%, #f0f0f2 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
    }
    .skel-icon { width: 40px; height: 40px; border-radius: 10px; }
    .skel-text { width: 48px; height: 8px; border-radius: 4px; }

    /* ── Right panel (light mode) ── */
    .plugin-panel {
      width: 220px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      border: 1px solid #e8e8ea;
    }

    .panel-titlebar {
      background: #f0f0f2;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid #e4e4e6;
    }
    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }
    .panel-title-text {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      margin-left: 4px;
      letter-spacing: 0.2px;
    }

    .panel-body { padding: 18px 16px; }

    .panel-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 8px;
    }
    .panel-section-label + * { }

    /* ── Style tabs (light) ── */
    .style-tabs {
      display: flex;
      background: #f0f0f2;
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
      margin-bottom: 18px;
    }
    .style-tab {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: #999;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.2px;
    }
    .style-tab.active {
      background: #fff;
      color: #1a1a1a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* ── Style description ── */
    .style-desc {
      font-size: 11px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 18px;
      min-height: 34px;
    }

    /* ── Divider ── */
    .panel-divider {
      height: 1px;
      background: #f0f0f2;
      margin: 16px 0;
    }

    /* ── Selected count ── */
    .selected-count {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
      min-height: 16px;
    }
    .selected-count strong { color: #1a1a1a; }

    /* ── Generate button ── */
    .btn-generate {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #1a1a1a;
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      letter-spacing: 0.1px;
    }
    .btn-generate:hover { background: #333; }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { background: #e4e4e6; color: #bbb; cursor: not-allowed; transform: none; }

    /* ── Download all ── */
    .btn-dl-all {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      border: 1.5px solid #e4e4e6;
      border-radius: 10px;
      background: #fff;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }
    .btn-dl-all.visible { display: block; }
    .btn-dl-all:hover { border-color: #1a1a1a; color: #1a1a1a; }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    .loading .spinner { display: block; }
    .loading .btn-label { display: none; }

    /* ── Animations ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1a1a1a;
      color: #fff;
      padding: 11px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── File input hidden ── */
    #fileInput { display: none; }
  </style>
</head>
<body>

<header>
  <h1>AI Icon Generator</h1>
  <p>스타일 레퍼런스를 선택하고 원하는 아이콘을 생성하세요</p>
</header>

<main>

  <!-- Left Panel -->
  <div class="left-panel">

    <!-- Style Reference card -->
    <div class="preview-card">
      <div class="card-label">스타일 레퍼런스</div>

      <!-- 8 sample icons -->
      <div class="sample-grid" id="sampleGrid"></div>

      <!-- Attach row -->
      <div class="attach-row">
        <button class="btn-attach-file" id="attachFileBtn">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 1v9M4 6l4-5 4 5" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          이미지 첨부
        </button>
        <input type="url" class="url-input" id="urlInput" placeholder="아이콘 URL 붙여넣기" />
        <button class="btn-attach-file" id="urlAttachBtn" style="padding:9px 14px;">첨부</button>
      </div>

      <!-- Attached chips -->
      <div class="attached-chips" id="attachedChips"></div>
    </div>

    <!-- Output card -->
    <div class="output-card" id="outputCard">
      <div class="output-header">
        <div class="card-label" id="outputLabel" style="margin-bottom:0">생성된 아이콘</div>
      </div>
      <div class="output-grid" id="outputGrid"></div>
    </div>

  </div>

  <!-- Right Panel (light mode) -->
  <div class="plugin-panel">
    <div class="panel-titlebar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="panel-title-text">Icon Generator</span>
    </div>

    <div class="panel-body">

      <div class="panel-section-label">아이콘 스타일</div>
      <div class="style-tabs">
        <button class="style-tab active" data-style="line">Line</button>
        <button class="style-tab" data-style="solid">Solid</button>
        <button class="style-tab" data-style="3d">3D</button>
      </div>

      <div class="style-desc" id="styleDesc">얇은 선으로 그려진 미니멀한 아이콘 스타일</div>

      <div class="panel-divider"></div>

      <div class="selected-count" id="selectedCount">레퍼런스를 선택해주세요</div>

      <button class="btn-generate" id="generateBtn">
        <span class="btn-label">✦ 아이콘 생성</span>
        <div class="spinner"></div>
      </button>

      <button class="btn-dl-all" id="dlAllBtn">모두 다운로드</button>

    </div>
  </div>

</main>

<input type="file" id="fileInput" accept="image/*" multiple />
<div class="toast" id="toast"></div>

/* ──────────────────────────────────────
   State
   ────────────────────────────────────── */
const state = {
  style: 'line',
  selected: new Set(),
  refImages: [],
  refUrls: [],
};

const STYLE_DESCS = {
  line: '얇은 선으로 그려진 미니멀한 아이콘 스타일',
  solid: '꽉 채운 실루엣의 선명하고 굵은 아이콘 스타일',
  '3d': '입체감 있는 그라디언트의 생동감 있는 아이콘 스타일',
};

/* ──────────────────────────────────────
   Render sample grid
   ────────────────────────────────────── */
function renderSampleGrid() {
  const grid = document.getElementById('sampleGrid');
  grid.innerHTML = '';
  Object.entries(ICONS).forEach(([key, icon]) => {
    const card = document.createElement('div');
    card.className = 'sample-card' + (state.selected.has(key) ? ' selected' : '');
    card.dataset.key = key;
    card.innerHTML = `${icon[state.style]}<span class="icon-name">${icon.label}</span>`;
    card.addEventListener('click', () => toggleSelect(key));
    grid.appendChild(card);
  });
}

function toggleSelect(key) {
  if (state.selected.has(key)) {
    state.selected.delete(key);
  } else {
    state.selected.add(key);
  }
  document.querySelector(`.sample-card[data-key="${key}"]`).classList.toggle('selected');
  updateSelectedCount();
}

function updateSelectedCount() {
  const n = state.selected.size;
  const el = document.getElementById('selectedCount');
  if (n === 0) {
    el.innerHTML = '레퍼런스를 선택해주세요';
  } else {
    el.innerHTML = `<strong>${n}개</strong>의 레퍼런스 선택됨`;
  }
}

/* ──────────────────────────────────────
   Style tabs
   ────────────────────────────────────── */
document.querySelectorAll('.style-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.style-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.style = tab.dataset.style;
    document.getElementById('styleDesc').textContent = STYLE_DESCS[state.style];
    renderSampleGrid();
  });
});

/* ──────────────────────────────────────
   File attach
   ────────────────────────────────────── */
document.getElementById('attachFileBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', e => {
  Array.from(e.target.files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => {
      state.refImages.push({ name: file.name, src: ev.target.result });
      addChip('img', file.name, state.refImages.length - 1);
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

/* ──────────────────────────────────────
   URL attach
   ────────────────────────────────────── */
document.getElementById('urlAttachBtn').addEventListener('click', attachUrl);
document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') attachUrl(); });

function attachUrl() {
  const val = document.getElementById('urlInput').value.trim();
  if (!val) return;
  try { new URL(val); } catch { showToast('유효한 URL을 입력해주세요'); return; }
  state.refUrls.push(val);
  addChip('url', new URL(val).hostname, state.refUrls.length - 1);
  document.getElementById('urlInput').value = '';
}

function addChip(type, label, idx) {
  const chips = document.getElementById('attachedChips');
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.dataset.type = type;
  chip.dataset.idx = idx;
  chip.innerHTML = `<span>${type === 'img' ? '🖼 ' : '🔗 '}${label}</span><button class="chip-remove">✕</button>`;
  chip.querySelector('.chip-remove').addEventListener('click', () => {
    chip.remove();
    updateSelectedCount();
  });
  chips.appendChild(chip);
  updateSelectedCount();
}

/* ──────────────────────────────────────
   Generate
   ────────────────────────────────────── */
document.getElementById('generateBtn').addEventListener('click', generate);

async function generate() {
  const keys = state.selected.size > 0
    ? Array.from(state.selected)
    : Object.keys(ICONS);

  const btn = document.getElementById('generateBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  const outputCard = document.getElementById('outputCard');
  const outputGrid = document.getElementById('outputGrid');
  outputCard.classList.add('visible');
  outputGrid.innerHTML = '';
  document.getElementById('dlAllBtn').classList.remove('visible');
  document.getElementById('outputLabel').textContent =
    `생성된 아이콘 · ${state.style.toUpperCase()} 스타일`;

  // Skeletons
  const count = Math.max(keys.length, 4);
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'out-card';
    c.style.pointerEvents = 'none';
    c.innerHTML = `<div class="skeleton skel-icon"></div><div class="skeleton skel-text"></div>`;
    outputGrid.appendChild(c);
  }
  outputCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Simulate generation (staggered)
  await new Promise(r => setTimeout(r, 400));
  outputGrid.innerHTML = '';

  for (let i = 0; i < keys.length; i++) {
    await new Promise(r => setTimeout(r, 100 + i * 80));
    const key = keys[i];
    const icon = ICONS[key];
    const card = document.createElement('div');
    card.className = 'out-card';
    card.style.animationDelay = `${i * 0.06}s`;
    const svgStr = icon[state.style];
    card.innerHTML = `${svgStr}<span class="out-name">${icon.label}</span><button class="btn-dl">SVG 저장</button>`;
    card.querySelector('.btn-dl').addEventListener('click', e => {
      e.stopPropagation();
      downloadSvg(svgStr, `icon-${key}-${state.style}.svg`);
    });
    outputGrid.appendChild(card);
  }

  document.getElementById('dlAllBtn').classList.add('visible');
  btn.classList.remove('loading');
  btn.disabled = false;
}

/* ──────────────────────────────────────
   Download
   ────────────────────────────────────── */
function downloadSvg(svgStr, filename) {
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('dlAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.out-card .btn-dl').forEach(btn => btn.click());
  showToast('모든 아이콘을 다운로드했습니다');
});

/* ──────────────────────────────────────
   Toast
   ────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Init ── */
renderSampleGrid();
</script>
