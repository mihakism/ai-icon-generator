<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Icon Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 83px 31px 62px;
    }
    header h1 {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    header p {
      font-size: 21px;
      color: #888;
      line-height: 1.6;
    }

    main {
      max-width: 936px;
      margin: 0 auto;
      padding: 0 31px 104px;
      display: flex;
      gap: 26px;
      align-items: flex-start;
    }

    @media (max-width: 700px) {
      main { flex-direction: column-reverse; }
      header h1 { font-size: 36px; }
    }

    /* ── Left ── */
    .left-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      background: #fff;
      border-radius: 26px;
      padding: 31px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    .card-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 20px;
    }

    /* ── Upload zone (compact horizontal) ── */
    .upload-zone {
      border: 1.5px dashed #d8d8da;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      background: #fafafa;
      transition: all 0.18s;
      cursor: pointer;
      margin-top: 14px;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: #0066ff;
      background: rgba(0,102,255,0.03);
    }

    .upload-icon {
      width: 40px; height: 40px;
      background: #f0f0f2;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .upload-icon svg { width: 20px; height: 20px; }

    .upload-text-group { display: flex; flex-direction: column; gap: 2px; }
    .upload-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .upload-sub {
      font-size: 12px;
      color: #bbb;
      line-height: 1.4;
    }

    /* ── Sample picker ── */
    .sample-picker {
      display: none;
      margin-top: 14px;
    }
    .sample-picker.visible { display: block; }

    .sample-picker-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 12px;
    }

    .sample-picker-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
    }

    /* Individual icon cell */
    .sample-icon-cell {
      aspect-ratio: 1;
      background: #f7f7f8;
      border: 2px solid transparent;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      padding: 12px;
    }
    .sample-icon-cell svg { width: 100%; height: 100%; display: block; }
    .sample-icon-cell:hover { border-color: #0066ff; background: rgba(0,102,255,0.04); }
    .sample-icon-cell.selected {
      border-color: #0066ff;
      background: rgba(0,102,255,0.08);
    }

    /* ── URL row ── */
    .url-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .url-input {
      flex: 1;
      padding: 11px 16px;
      border: 1.5px solid #e4e4e6;
      border-radius: 12px;
      font-family: inherit;
      font-size: 13px;
      color: #1a1a1a;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .url-input::placeholder { color: #ccc; }
    .url-input:focus { border-color: #0066ff; }

    .btn-url-attach {
      padding: 11px 18px;
      border: 1.5px solid #e4e4e6;
      border-radius: 12px;
      background: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-url-attach:hover { border-color: #1a1a1a; color: #1a1a1a; }

    /* ── Small file attach button (bottom) ── */
    .bottom-attach-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-attach-small {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px solid #e4e4e6;
      border-radius: 10px;
      background: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: #777;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-attach-small:hover { border-color: #1a1a1a; color: #1a1a1a; }
    .btn-attach-small svg { width: 13px; height: 13px; flex-shrink: 0; }

    .attach-hint {
      font-size: 12px;
      color: #bbb;
    }

    /* ── Previews ── */
    .preview-area {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .preview-area.visible { display: flex; }

    .preview-item {
      position: relative;
      width: 86px; height: 86px;
      border-radius: 14px;
      overflow: hidden;
      border: 1.5px solid #e4e4e6;
      background: #f7f7f8;
      flex-shrink: 0;
    }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-item .remove-btn {
      position: absolute;
      top: 5px; right: 5px;
      width: 20px; height: 20px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-item .remove-btn:hover { background: #e03737; }

    /* sample set preview item */
    .preview-item.sample-thumb {
      background: #f0f0f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px;
      gap: 4px;
    }
    .preview-item.sample-thumb .thumb-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      width: 54px; height: 54px;
    }
    .preview-item.sample-thumb .thumb-grid svg { width: 100%; height: 100%; }
    .preview-item.sample-thumb .thumb-label {
      font-size: 8px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .url-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #f7f7f8;
      border: 1.5px solid #e4e4e6;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      max-width: 260px;
    }
    .url-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .url-chip button { background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px; flex-shrink: 0; }
    .url-chip button:hover { color: #e03737; }

    /* ── Output card ── */
    .output-card { display: none; }
    .output-card.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .output-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .out-card {
      background: #f7f7f8;
      border-radius: 16px;
      padding: 20px 10px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      animation: fadeUp 0.35s ease both;
    }
    .out-card:hover { border-color: #0066ff; background: rgba(0,102,255,0.04); }
    .out-card svg, .out-card img { width: 52px; height: 52px; display: block; }
    .out-card .out-name {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }
    .out-card .btn-dl {
      display: none;
      padding: 4px 12px;
      border: 1.5px solid #e4e4e6;
      border-radius: 7px;
      background: #fff;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
    }
    .out-card:hover .btn-dl { display: block; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f2 25%, #e6e6e9 50%, #f0f0f2 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 10px;
    }
    .skel-icon { width: 52px; height: 52px; border-radius: 13px; }
    .skel-text { width: 52px; height: 10px; border-radius: 5px; }

    /* ── Right plugin panel (light) ── */
    .plugin-panel {
      width: 286px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      border: 1px solid #e8e8ea;
    }

    .panel-titlebar {
      background: #2c2c2c;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }
    .panel-title-text {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-left: 4px;
    }

    .panel-body { padding: 22px 20px; }

    .panel-section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 10px;
    }

    /* ── Icon form input ── */
    .icon-form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e4e4e6;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
      margin-bottom: 8px;
    }
    .icon-form-input::placeholder { color: #ccc; }
    .icon-form-input:focus { border-color: #0066ff; }

    .form-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 22px;
    }
    .form-tag {
      padding: 5px 11px;
      border: 1.5px solid #e8e8ea;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      background: #fafafa;
      transition: all 0.14s;
      user-select: none;
    }
    .form-tag:hover { border-color: #0066ff; color: #0066ff; background: rgba(0,102,255,0.04); }
    .form-tag.selected { border-color: #0066ff; background: #0066ff; color: #fff; }

    .panel-divider {
      height: 1px;
      background: #f0f0f2;
      margin: 18px 0;
    }

    /* ── Style tabs ── */
    .style-tabs {
      display: flex;
      background: #f0f0f2;
      border-radius: 13px;
      padding: 4px;
      gap: 3px;
      margin-bottom: 16px;
    }
    .style-tab {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #bbb;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: not-allowed;
      transition: all 0.18s;
      user-select: none;
    }
    .style-tab.enabled { cursor: pointer; color: #999; }
    .style-tab.enabled:hover { color: #555; }
    .style-tab.active { background: #fff; color: #1a1a1a; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }

    .lock-notice {
      font-size: 12px;
      color: #bbb;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .lock-notice.hidden { display: none; }

    .style-desc {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 20px;
      min-height: 38px;
    }
    .style-desc.hidden { display: none; }

    .selected-count { display: none; }

    /* ── Buttons ── */
    .btn-generate {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 13px;
      background: #1a1a1a;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-generate:hover { background: #333; }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { background: #e8e8ea; color: #c0c0c4; cursor: not-allowed; transform: none; }

    .btn-dl-all {
      width: 100%;
      margin-top: 10px;
      padding: 11px;
      border: 1.5px solid #e4e4e6;
      border-radius: 13px;
      background: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }
    .btn-dl-all.visible { display: block; }
    .btn-dl-all:hover { border-color: #1a1a1a; color: #1a1a1a; }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    .loading .spinner { display: block; }
    .loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1a1a1a;
      color: #fff;
      padding: 13px 24px;
      border-radius: 13px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>AI Icon Generator</h1>
  <p>스타일 레퍼런스 이미지를 첨부하면 원하는 아이콘을 생성하는 플러그인</p>
</header>

<main>
  <!-- Left Panel -->
  <div class="left-panel">

    <!-- Reference card -->
    <div class="card" id="refCard">
      <div class="card-label">스타일 레퍼런스</div>

      <!-- Sample picker (always visible, comes first) -->
      <div class="sample-picker visible" id="samplePicker">
        <div class="sample-picker-grid" id="samplePickerGrid"></div>
      </div>

      <!-- Upload zone (compact, clickable) -->
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M14 18V8" stroke="#999" stroke-width="2" stroke-linecap="round"/>
            <path d="M9 13l5-6 5 6" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5 20v1a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1" stroke="#999" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="upload-text-group">
          <div class="upload-title">이미지 직접 첨부</div>
          <div class="upload-sub">클릭하거나 드래그해서 업로드</div>
        </div>
      </div>

      <!-- URL row -->
      <div class="url-row">
        <input class="url-input" id="urlInput" type="url" placeholder="아이콘 URL 붙여넣기" />
        <button class="btn-url-attach" id="urlAttachBtn">첨부</button>
      </div>

      <!-- Previews -->
      <div class="preview-area" id="previewArea"></div>
    </div>

    <!-- Output -->
    <div class="card output-card" id="outputCard">
      <div class="output-header">
        <div class="card-label" id="outputLabel" style="margin-bottom:0">생성된 아이콘</div>
      </div>
      <div class="output-grid" id="outputGrid"></div>
    </div>

  </div>

  <!-- Right plugin panel -->
  <div class="plugin-panel">
    <div class="panel-titlebar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="panel-title-text">Icon Generator</span>
    </div>

    <div class="panel-body">

      <!-- ① 원하는 형태 입력 -->
      <div class="panel-section-label">원하는 아이콘 형태</div>
      <input class="icon-form-input" id="iconFormInput"
        type="text" placeholder="예: 설정, 알림, 검색, 글쓰기..." />
      <div class="panel-divider" style="margin-top:4px"></div>

      <!-- ② 아이콘 스타일 -->
      <div class="panel-section-label">아이콘 스타일</div>
      <div class="style-tabs">
        <button class="style-tab" data-style="line">Line</button>
        <button class="style-tab" data-style="solid">Solid</button>
        <button class="style-tab" data-style="3d">3D</button>
      </div>

      <div class="style-desc hidden" id="styleDesc"></div>

      <div class="panel-divider"></div>

      <div class="selected-count" id="selectedCount"></div>

      <button class="btn-generate" id="generateBtn" disabled>
        <span class="btn-label">✦ 아이콘 생성</span>
        <div class="spinner"></div>
      </button>

      <button class="btn-dl-all" id="dlAllBtn">모두 다운로드</button>

    </div>
  </div>
</main>

<input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
<div class="toast" id="toast"></div>

<script>
/* ── Icon library ── */
const ICONS = {
  settings: { label: '설정',

const STYLE_DESCS = {
  line:  '얇은 선으로 그려진 미니멀한 아이콘 스타일',
  solid: '꽉 채운 실루엣의 선명하고 굵은 아이콘 스타일',
  '3d':  '입체감 있는 그라디언트의 생동감 있는 아이콘 스타일',
};

/* ── State ── */
const state = {
  style: null,
  hasImage: false,
  refCount: 0,
  usedSampleIds: new Set(),
};

/* ── Build sample picker — individual icon cells ── */
function buildSamplePicker() {
  const grid = document.getElementById('samplePickerGrid');
  const iconKeys = Object.keys(ICONS);           // 8 icons
  iconKeys.forEach(key => {
    const cell = document.createElement('div');
    cell.className = 'sample-icon-cell';
    cell.dataset.key = key;
    cell.innerHTML = ICONS[key].line;            // show line style as sample
    cell.addEventListener('click', () => {
      const isSelected = cell.classList.toggle('selected');
      if (isSelected) {
        state.usedSampleIds.add(key);
      } else {
        state.usedSampleIds.delete(key);
      }
      syncPreview();
    });
    grid.appendChild(cell);
  });
}

/* ── Variation generator ── */
function makeVariations(iconKey, style) {
  const base = ICONS[iconKey][style];

  if (style === 'line') {
    const rc = (svg, color) =>
      svg.replace(/stroke="#1a1a1a"/g, `stroke="${color}"`)
         .replace(/(?<![a-z])fill="#1a1a1a"/g, `fill="${color}"`);
    const rw = (svg, w) =>
      svg.replace(/stroke-width="2(?:\.5)?"/g, `stroke-width="${w}"`);
    const cap = (svg, lc, lj) =>
      svg.replace(/stroke-linecap="round"/g, `stroke-linecap="${lc}"`)
         .replace(/stroke-linejoin="round"/g, `stroke-linejoin="${lj}"`);
    return [
      base,                                            // 1. 기본 (검정 2px)
      rw(base, '1'),                                   // 2. 헤어라인 (1px)
      rw(base, '3'),                                   // 3. 볼드 (3px)
      cap(rw(base, '2.5'), 'square', 'miter'),         // 4. 각진 캡
      rc(base, '#0066ff'),                             // 5. 블루
      rc(rw(base, '1.5'), '#888'),                     // 6. 연회색 씬
      rc(rw(base, '3'), '#e03737'),                    // 7. 레드 볼드
      rc(cap(rw(base, '2'), 'butt', 'bevel'), '#6c5ce7'), // 8. 퍼플 버트캡
    ];
  }

  if (style === 'solid') {
    const rc = (svg, color) => svg.replace(/fill="#1a1a1a"/g, `fill="${color}"`);
    const inv = svg =>
      rc(svg, '#fff').replace('<svg ', '<svg style="background:#1a1a1a;border-radius:14px;" ');
    return [
      base,                          // 1. 블랙
      rc(base, '#0066ff'),           // 2. 블루
      rc(base, '#6c5ce7'),           // 3. 퍼플
      rc(base, '#00b894'),           // 4. 민트
      rc(base, '#e03737'),           // 5. 레드
      rc(base, '#e17055'),           // 6. 오렌지
      rc(base, '#636e72'),           // 7. 다크 그레이
      inv(base),                     // 8. 인버티드 (흰 아이콘/검정 배경)
    ];
  }

  // 3D — 8가지 그라디언트 팔레트로 교체
  const PALETTES = [
    ['#a29bfe', '#6c5ce7'],   // 1. 퍼플
    ['#74b9ff', '#0984e3'],   // 2. 오션 블루
    ['#55efc4', '#00b894'],   // 3. 민트 그린
    ['#fdcb6e', '#e17055'],   // 4. 선셋 오렌지
    ['#fd79a8', '#e84393'],   // 5. 핫핑크
    ['#ff7675', '#c0392b'],   // 6. 레드
    ['#ffeaa7', '#f9ca24'],   // 7. 골드
    ['#a8e6cf', '#2ecc71'],   // 8. 라임 그린
  ];
  return PALETTES.map(([c1, c2]) => {
    let n = 0;
    return base.replace(/stop-color="[^"]+"/g, () => `stop-color="${n++ === 0 ? c1 : c2}"`);
  });
}

/* ── File attach (click + drag & drop) ── */

const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('click', () => document.getElementById('fileInput').click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

document.getElementById('fileInput').addEventListener('change', e => {
  handleFiles(e.target.files);
  e.target.value = '';
});

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = ev => addImagePreview(ev.target.result, file.name);
    reader.readAsDataURL(file);
  });
}

function addImagePreview(src, name) {
  const previewArea = document.getElementById('previewArea');
  previewArea.classList.add('visible');
  const item = document.createElement('div');
  item.className = 'preview-item';
  item.innerHTML = `<img src="${src}" alt="${name}" /><button class="remove-btn">✕</button>`;
  item.querySelector('.remove-btn').addEventListener('click', () => {
    item.remove();
    syncPreview();
  });
  previewArea.appendChild(item);
  syncPreview();
}

/* ── URL attach ── */
document.getElementById('urlAttachBtn').addEventListener('click', attachUrl);
document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') attachUrl(); });

function attachUrl() {
  const val = document.getElementById('urlInput').value.trim();
  if (!val) return;
  try { new URL(val); } catch { showToast('유효한 URL을 입력해주세요'); return; }
  const previewArea = document.getElementById('previewArea');
  previewArea.classList.add('visible');
  const chip = document.createElement('div');
  chip.className = 'url-chip';
  chip.innerHTML = `<span>🔗 ${new URL(val).hostname}</span><button title="제거">✕</button>`;
  chip.querySelector('button').addEventListener('click', () => { chip.remove(); syncPreview(); });
  previewArea.appendChild(chip);
  document.getElementById('urlInput').value = '';
  syncPreview();
}

/* ── Sync preview → unlock tabs ── */
function syncPreview() {
  const previewArea = document.getElementById('previewArea');
  const urlItems = previewArea.querySelectorAll('.preview-item, .url-chip');
  if (urlItems.length === 0) previewArea.classList.remove('visible');

  const totalRef = urlItems.length + state.usedSampleIds.size;
  state.hasImage = totalRef > 0;
  state.refCount = totalRef;

  document.querySelectorAll('.style-tab').forEach(t =>
    t.classList.toggle('enabled', state.hasImage)
  );
  updateStatus();
}

function updateStatus() {
  const countEl = document.getElementById('selectedCount');
  const genBtn  = document.getElementById('generateBtn');

  countEl.innerHTML = '';
  if (!state.hasImage || !state.style) {
    genBtn.disabled = true;
  } else {
    genBtn.disabled = false;
  }
}

/* ── Style tabs ── */
document.querySelectorAll('.style-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    if (!tab.classList.contains('enabled')) return;
    document.querySelectorAll('.style-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.style = tab.dataset.style;
    const desc = document.getElementById('styleDesc');
    desc.classList.remove('hidden');
    desc.textContent = STYLE_DESCS[state.style];
    // Left panel does NOT change
    updateStatus();
  });
});

/* ── Suggestion tags ── */
document.querySelectorAll('.form-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    tag.classList.toggle('selected');
    const input = document.getElementById('iconFormInput');
    const val = tag.dataset.val;
    const parts = input.value.split(',').map(s => s.trim()).filter(Boolean);
    if (tag.classList.contains('selected')) {
      if (!parts.includes(val)) parts.push(val);
    } else {
      const i = parts.indexOf(val); if (i > -1) parts.splice(i, 1);
    }
    input.value = parts.join(', ');
  });
});

/* ── Resolve which icons to generate ── */
function resolveTargetIcons() {
  const inputRaw = document.getElementById('iconFormInput').value.trim();
  const keywords = inputRaw
    ? inputRaw.split(',').map(s => s.trim()).filter(Boolean)
    : [];

  // label → key lookup
  const labelMap = {};
  Object.entries(ICONS).forEach(([k, v]) => { labelMap[v.label] = k; });

  let matched = keywords
    .map(kw => labelMap[kw] || Object.keys(ICONS).find(k =>
      ICONS[k].label.includes(kw) || kw.includes(ICONS[k].label)))
    .filter(Boolean);

  // deduplicate
  matched = [...new Set(matched)];

  // fallback: use selected cells, else all
  if (matched.length === 0) {
    matched = state.usedSampleIds.size > 0
      ? [...state.usedSampleIds].filter(k => ICONS[k])
      : Object.keys(ICONS);
  }

  return matched;
}

/* ── Generate ── */
document.getElementById('generateBtn').addEventListener('click', generate);

async function generate() {
  const btn = document.getElementById('generateBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  const outputCard = document.getElementById('outputCard');
  const outputGrid = document.getElementById('outputGrid');
  outputCard.classList.add('visible');
  outputGrid.innerHTML = '';
  document.getElementById('dlAllBtn').classList.remove('visible');

  const targetKeys = resolveTargetIcons();
  const isSingleType = targetKeys.length === 1;
  const outputLabel = isSingleType
    ? `"${ICONS[targetKeys[0]].label}" 아이콘 배리에이션 · ${state.style.toUpperCase()}`
    : `생성된 아이콘 · ${state.style.toUpperCase()} 스타일`;
  document.getElementById('outputLabel').textContent = outputLabel;

  // Build task list: if single type → 8 variations; multi → 4 variations each (max 8 total)
  let tasks = [];
  if (isSingleType) {
    const variations = makeVariations(targetKeys[0], state.style);
    tasks = variations.map((svg, i) => ({
      svg, label: `${ICONS[targetKeys[0]].label} v${i + 1}`, key: targetKeys[0], idx: i,
    }));
  } else {
    const varsPerIcon = Math.max(1, Math.floor(8 / targetKeys.length));
    targetKeys.forEach(key => {
      const variations = makeVariations(key, state.style);
      for (let i = 0; i < varsPerIcon; i++) {
        tasks.push({ svg: variations[i] || variations[0], label: ICONS[key].label, key, idx: i });
      }
    });
    tasks = tasks.slice(0, 8);
  }

  // Skeleton
  tasks.forEach(() => {
    const c = document.createElement('div');
    c.className = 'out-card';
    c.style.pointerEvents = 'none';
    c.innerHTML = `<div class="skeleton skel-icon"></div><div class="skeleton skel-text"></div>`;
    outputGrid.appendChild(c);
  });
  outputCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  await new Promise(r => setTimeout(r, 480));
  outputGrid.innerHTML = '';

  for (let i = 0; i < tasks.length; i++) {
    await new Promise(r => setTimeout(r, 60 + i * 55));
    const { svg, label, key, idx } = tasks[i];
    const card = document.createElement('div');
    card.className = 'out-card';
    card.style.animationDelay = `${i * 0.05}s`;
    const dispLabel = isSingleType ? `v${idx + 1}` : label;
    card.innerHTML = `${svg}<span class="out-name">${dispLabel}</span><button class="btn-dl">SVG 저장</button>`;
    card.querySelector('.btn-dl').addEventListener('click', e => {
      e.stopPropagation();
      downloadSvg(svg, `icon-${key}-${state.style}-v${idx + 1}.svg`);
    });
    outputGrid.appendChild(card);
  }

  document.getElementById('dlAllBtn').classList.add('visible');
  btn.classList.remove('loading');
  btn.disabled = false;
}

function downloadSvg(svgStr, filename) {
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('dlAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.out-card .btn-dl').forEach(b => b.click());
  showToast('모든 아이콘을 다운로드했습니다');
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

buildSamplePicker();
</script>
</body>
